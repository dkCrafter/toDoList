<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ═══ FIREBASE STORAGE ═══ */
const DOC_REF = db.collection("hub").doc("main");

async function fbLoad() {
  const snap = await DOC_REF.get();
  return snap.exists ? snap.data() : null;
}
async function fbSave(data) {
  await DOC_REF.set(data);
}

/* ═══ CONSTANTS ═══ */
const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
const daysAgo = (ts) => Math.floor((Date.now() - ts) / 864e5);
const fmtDate = (ts) => { const d = daysAgo(ts); if (d===0) return "오늘"; if (d===1) return "어제"; if (d<7) return `${d}일 전`; const dt = new Date(ts); return `${dt.getMonth()+1}/${dt.getDate()}`; };
const STALE = 7;
const rndColor = () => "#" + Math.floor(Math.random()*0xAAAAAA+0x333333).toString(16);

const PRIORITIES = [
  { id: "high", name: "높음", color: "#EB5757" },
  { id: "medium", name: "보통", color: "#F2994A" },
  { id: "low", name: "낮음", color: "#BDBDBD" },
];

const DEFAULT_TASK_CATS = [
  { id: "personal", name: "개인", color: "#EB5757", subs: [] },
  { id: "work", name: "회사", color: "#2F80ED", subs: [] },
  { id: "team", name: "팀 지시", color: "#9B51E0", subs: [] },
  { id: "plan", name: "계획", color: "#27AE60", subs: [] },
];

const DEFAULT_NEWS_CATS = [
  { id: "comfyui", name: "ComfyUI", color: "#27AE60", subs: [
    { id: "nodes", name: "Custom Nodes" }, { id: "workflow", name: "워크플로우" },
    { id: "model_c", name: "모델" }, { id: "lora_c", name: "LoRA" },
  ]},
  { id: "nuke", name: "Nuke", color: "#2F80ED", subs: [
    { id: "copycat", name: "Copycat/ML" }, { id: "nuke_bridge", name: "Bridge" },
    { id: "nuke_script", name: "스크립트" },
  ]},
  { id: "tracking", name: "Tracking", color: "#F2994A", subs: [
    { id: "point_t", name: "Point" }, { id: "plane_t", name: "Plane" }, { id: "3d_t", name: "3D" },
  ]},
  { id: "roto", name: "Roto/Matte", color: "#EB5757", subs: [
    { id: "auto_roto", name: "Auto Roto" }, { id: "matte_ex", name: "Matte 추출" },
  ]},
  { id: "inpaint", name: "Inpaint", color: "#9B51E0", subs: [] },
  { id: "deepface", name: "DeepFaceLab", color: "#BB6BD9", subs: [
    { id: "faceswap", name: "Face Swap" }, { id: "lipsync", name: "Lip Sync" },
  ]},
  { id: "upscale", name: "Upscale", color: "#6FCF97", subs: [] },
  { id: "tutorial", name: "Tutorial", color: "#4ECDC4", subs: [] },
  { id: "etc", name: "기타", color: "#828282", subs: [] },
];

const detectSource = (url) => { if (!url) return "Web"; const u=url.toLowerCase(); if (u.includes("facebook.com")||u.includes("fb.com")) return "Facebook"; if (u.includes("linkedin.com")) return "LinkedIn"; if (u.includes("reddit.com")) return "Reddit"; if (u.includes("youtube.com")||u.includes("youtu.be")) return "YouTube"; if (u.includes("twitter.com")||u.includes("x.com")) return "X"; if (u.includes("arxiv.org")) return "arXiv"; if (u.includes("github.com")) return "GitHub"; return "Web"; };

// 썸네일 URL → YouTube/mp4 처리
const getYtId = (url) => { if (!url) return null; let m = url.match(/youtube\.com\/watch\?.*v=([^&]+)/); if (m) return m[1]; m = url.match(/youtu\.be\/([^?&]+)/); if (m) return m[1]; return null; };
const isVideo = (url) => url && (url.toLowerCase().includes(".mp4"));

function ThumbMedia({ thumb, url, source }) {
  const [videoFailed, setVideoFailed] = React.useState(false);
  const [imgFailed, setImgFailed] = React.useState(false);
  const ytId = getYtId(thumb||"") || getYtId(url||"");
  const goUrl = url ? () => window.open(url, "_blank", "noopener,noreferrer") : null;
  const base = {cursor:url?"pointer":"default"};

  // YouTube
  if (ytId) {
    return (
      <div onClick={goUrl} style={{height:140,overflow:"hidden",background:"#000",position:"relative",...base}}>
        <img src={`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`} alt=""
          style={{width:"100%",height:"100%",objectFit:"cover"}}
          onError={(e)=>{e.target.parentElement.style.height="0"}} />
        <span style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
          fontSize:32,pointerEvents:"none",filter:"drop-shadow(0 2px 6px rgba(0,0,0,0.5))"}}>▶</span>
      </div>
    );
  }

  // MP4 동영상 — 만료되면 fallback 표시
  if (isVideo(thumb||"")) {
    // 영상 로드 실패(만료/403) → 출처 + 만료 안내 카드로 전환
    if (videoFailed) {
      return (
        <div onClick={goUrl} style={{height:72,background:"#F3F4F6",borderBottom:"1px solid #E5E7EB",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,...base}}>
          <span style={{fontSize:18}}>🎬</span>
          <span style={{fontSize:10,color:"#9B9A97",fontWeight:500}}>동영상 미리보기 만료됨</span>
          {url&&<span style={{fontSize:10,color:"#56B4E8"}}>클릭하여 원본 열기 ↗</span>}
        </div>
      );
    }
    return (
      <div onClick={goUrl} style={{height:140,overflow:"hidden",background:"#111",position:"relative",...base}}>
        <video
          src={thumb}
          autoPlay muted loop playsInline
          style={{width:"100%",height:"100%",objectFit:"cover"}}
          onError={()=>setVideoFailed(true)}
        />
      </div>
    );
  }

  // 일반 이미지 — 로드 실패 시 소스 라벨로 전환
  if (thumb) {
    if (imgFailed) {
      return (
        <div onClick={goUrl} style={{height:36,background:"#FBFBFA",borderBottom:"1px solid #F7F6F3",
          display:"flex",alignItems:"center",justifyContent:"center",...base}}>
          <span style={{fontSize:10,color:"#B4B4B0",letterSpacing:1}}>{source}</span>
        </div>
      );
    }
    return (
      <div onClick={goUrl} style={{height:140,overflow:"hidden",background:"#F7F6F3",...base}}>
        <img src={thumb} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}
          onError={()=>setImgFailed(true)} />
      </div>
    );
  }

  // 썸네일 없음
  return (
    <div onClick={goUrl} style={{height:36,background:"#FBFBFA",borderBottom:"1px solid #F7F6F3",
      display:"flex",alignItems:"center",justifyContent:"center",...base}}>
      <span style={{fontSize:10,color:"#B4B4B0",letterSpacing:1}}>{source}</span>
    </div>
  );
}
const defaultData = () => ({ tasks: [], news: [], taskCats: DEFAULT_TASK_CATS, newsCats: DEFAULT_NEWS_CATS });

function newsMatchesFilter(item, filterId, newsCats) {
  if (filterId === "all") return true;
  if ((item.categories||[]).includes(filterId)) return true;
  if ((item.subCategories||[]).includes(filterId)) return true;
  return false;
}

/* ═══ SYNC BADGE ═══ */
function SyncBadge({ status }) {
  const c = { synced:"#27AE60", saving:"#F2994A", error:"#EB5757", loading:"#9B9A97" };
  const l = { synced:"저장됨", saving:"저장 중...", error:"저장 실패", loading:"로딩..." };
  return (<span style={{ fontSize:10, color:c[status]||"#9B9A97", display:"flex", alignItems:"center", gap:3 }}><span style={{ width:6, height:6, borderRadius:3, background:c[status]||"#9B9A97" }} />{l[status]||status}</span>);
}

/* ═══ MAIN APP ═══ */
function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState("loading");
  const [view, setView] = useState(() => sessionStorage.getItem("dkhub_view") || "tasks");
  const changeView = (v) => { sessionStorage.setItem("dkhub_view", v); setView(v); };
  const [taskFilter, setTaskFilter] = useState("all");
  const [taskTab, setTaskTab] = useState("active");
  const [taskGroup, setTaskGroup] = useState(() => sessionStorage.getItem("dkhub_tg") || "personal"); // 모바일 탭: personal|work
  const [taskTabWork, setTaskTabWork] = useState("active"); // 회사 컬럼 진행중/완료
  const [newsMainFilter, setNewsMainFilter] = useState("all");
  const [newsSubFilter, setNewsSubFilter] = useState(null);
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [editItem, setEditItem] = useState(null);
  const [filterOpen, setFilterOpen] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [catEdit, setCatEdit] = useState(null);
  const [sideExpanded, setSideExpanded] = useState([]);
  const [fontSize, setFontSize] = useState(15); // 모바일 폰트 크기
  const [slideX, setSlideX] = useState(0);       // 현재 드래그 offset px
  const [isSliding, setIsSliding] = useState(false); // transition 재생 중
  const saveRef = useRef(null);
  const loadedRef = useRef(false);
  const localSaveRef = useRef(false);
  const touchStartX = useRef(null);
  const touchStartY = useRef(null);
  const touchStartEdge = useRef(false);
  const swipeLocked = useRef(false);

  // Load from Firebase + listen for real-time updates
  useEffect(() => {
    const unsub = DOC_REF.onSnapshot((snap) => {
      // Skip if this snapshot was triggered by our own save
      if (localSaveRef.current) { localSaveRef.current = false; return; }
      if (snap.exists) {
        const d = snap.data();
        if (!d.taskCats) d.taskCats = DEFAULT_TASK_CATS;
        if (!d.newsCats) d.newsCats = DEFAULT_NEWS_CATS;
        d.taskCats = d.taskCats.map((c) => ({ ...c, subs: c.subs || [] }));
        d.newsCats = d.newsCats.map((c) => ({ ...c, subs: c.subs || [] }));
        setData(d);
        setSyncStatus("synced");
        loadedRef.current = true;
      } else if (!loadedRef.current) {
        // Only use defaults if this is the very first load and no data exists
        setData(defaultData());
        setSyncStatus("synced");
        loadedRef.current = true;
      }
      setLoading(false);
    }, (err) => {
      console.error("Firestore listen error:", err);
      // On error, only set defaults if we never loaded real data
      if (!loadedRef.current) {
        setData(defaultData());
        loadedRef.current = true;
      }
      setSyncStatus("error");
      setLoading(false);
    });
    return () => unsub();
  }, []);

  // 수정4: 모바일 앱 복귀 시 Firebase 재연결 (visibilitychange)
  useEffect(() => {
    const handleVisibility = () => {
      if (document.visibilityState === "visible" && loadedRef.current) {
        setSyncStatus("loading");
        DOC_REF.get().then((snap) => {
          if (snap.exists) {
            const d = snap.data();
            if (!d.taskCats) d.taskCats = DEFAULT_TASK_CATS;
            if (!d.newsCats) d.newsCats = DEFAULT_NEWS_CATS;
            d.taskCats = d.taskCats.map((c) => ({ ...c, subs: c.subs || [] }));
            d.newsCats = d.newsCats.map((c) => ({ ...c, subs: c.subs || [] }));
            setData(d);
          }
          setSyncStatus("synced");
        }).catch(() => setSyncStatus("error"));
      }
    };
    document.addEventListener("visibilitychange", handleVisibility);
    return () => document.removeEventListener("visibilitychange", handleVisibility);
  }, []);

  // Save to Firebase (debounced) — only if we successfully loaded first
  const save = useCallback((d) => {
    setData(d);
    if (!loadedRef.current) return; // don't save if we never loaded
    setSyncStatus("saving");
    clearTimeout(saveRef.current);
    saveRef.current = setTimeout(async () => {
      try {
        localSaveRef.current = true;
        await fbSave(d);
        setSyncStatus("synced");
      } catch (e) {
        console.error("Save failed:", e);
        localSaveRef.current = false;
        setSyncStatus("error");
      }
    }, 800);
  }, []);

  if (loading || !data) return <Loader />;

  const staleT = data.tasks.filter((t) => !t.done && daysAgo(t.lastChecked||t.createdAt) >= STALE);
  const staleN = data.news.filter((n) => !n.read && daysAgo(n.lastChecked||n.createdAt) >= STALE);
  const reminders = staleT.length + staleN.length;
  const activeNewsFilter = newsSubFilter || newsMainFilter;
  // 개인: personal 카테고리, 회사: work/team/plan 카테고리 (나머지 카테고리는 회사로)
  const PERSONAL_CATS = ["personal"];
  const isPersonalTask = (t) => {
    const cat = data.taskCats.find(c => c.id === t.category);
    return !t.category || PERSONAL_CATS.includes(t.category);
  };
  const isWorkTask = (t) => !isPersonalTask(t);

  const filteredTasks = data.tasks
    .filter((t)=>(taskTab==="active"?!t.done:t.done))
    .filter((t)=>taskFilter==="all"||t.category===taskFilter)
    .filter((t)=>!search||`${t.title} ${t.desc||""}`.toLowerCase().includes(search.toLowerCase()));

  // 개인 컬럼용
  const filteredPersonal = data.tasks
    .filter(isPersonalTask)
    .filter((t)=>(taskTab==="active"?!t.done:t.done))
    .filter((t)=>!search||`${t.title} ${t.desc||""}`.toLowerCase().includes(search.toLowerCase()));

  // 회사 컬럼용
  const filteredWork = data.tasks
    .filter(isWorkTask)
    .filter((t)=>(taskTabWork==="active"?!t.done:t.done))
    .filter((t)=>!search||`${t.title} ${t.desc||""}`.toLowerCase().includes(search.toLowerCase()));
  const filteredNews = data.news
    .filter((n)=>newsMatchesFilter(n,activeNewsFilter,data.newsCats))
    .filter((n)=>!search||`${n.title} ${n.description||""}`.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));

  const addTask=(t)=>save({...data,tasks:[{...t,id:uid(),createdAt:Date.now(),done:false,lastChecked:null},...data.tasks]});
  const updTask=(id,u)=>save({...data,tasks:data.tasks.map((t)=>t.id===id?{...t,...u}:t)});
  const delTask=(id)=>save({...data,tasks:data.tasks.filter((t)=>t.id!==id)});
  const addNews=(n)=>save({...data,news:[{...n,id:uid(),createdAt:Date.now(),read:false,lastChecked:null},...data.news]});
  const updNews=(id,u)=>save({...data,news:data.news.map((n)=>n.id===id?{...n,...u}:n)});
  const delNews=(id)=>save({...data,news:data.news.filter((n)=>n.id!==id)});

  const getCats=(type)=>type==="task"?data.taskCats:data.newsCats;
  const setCats=(type,cats)=>save({...data,[type==="task"?"taskCats":"newsCats"]:cats});
  const addCat=(type)=>setCats(type,[...getCats(type),{id:uid(),name:"새 카테고리",color:rndColor(),subs:[]}]);
  const updCat=(type,id,u)=>setCats(type,getCats(type).map((c)=>c.id===id?{...c,...u}:c));
  const delCat=(type,id)=>setCats(type,getCats(type).filter((c)=>c.id!==id));
  const addSub=(type,catId)=>setCats(type,getCats(type).map((c)=>c.id===catId?{...c,subs:[...c.subs,{id:uid(),name:"새 서브"}]}:c));
  const updSub=(type,catId,subId,u)=>setCats(type,getCats(type).map((c)=>c.id===catId?{...c,subs:c.subs.map((s)=>s.id===subId?{...s,...u}:s)}:c));
  const delSub=(type,catId,subId)=>setCats(type,getCats(type).map((c)=>c.id===catId?{...c,subs:c.subs.filter((s)=>s.id!==subId)}:c));

  const openModal=(t,item=null)=>{setEditItem(item);setModal(t);};
  const closeModal=()=>{setModal(null);setEditItem(null);};
  const toggleSideExp=(id)=>setSideExpanded((p)=>p.includes(id)?p.filter((x)=>x!==id):[...p,id]);

  const navItems=[
    {id:"tasks",label:"TO DO",count:data.tasks.filter((t)=>!t.done).length},
    {id:"news",label:"News Hub",count:data.news.filter((n)=>!n.read).length},
    {id:"reminders",label:"리마인더",count:reminders,hot:true,divider:true},
  ];
  const selectedMainCat=data.newsCats.find((c)=>c.id===newsMainFilter);
  const newsFilterLabel=newsSubFilter?(()=>{const p=data.newsCats.find((c)=>c.subs.some((s)=>s.id===newsSubFilter));return`${p?.name} › ${p?.subs.find((s)=>s.id===newsSubFilter)?.name}`;})():newsMainFilter!=="all"?selectedMainCat?.name:null;
  const catType=view==="tasks"?"task":"news";

  // 스와이프 핸들러 — 실시간 드래그 슬라이드
  const NAV_ORDER = ["tasks","news","reminders"];
  const handleTouchStart = (e) => {
    if (drawerOpen) return;
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
    touchStartEdge.current = e.touches[0].clientX <= 22;
    swipeLocked.current = false;
    setIsSliding(false);
  };
  const handleTouchMove = (e) => {
    if (touchStartX.current === null || drawerOpen || swipeLocked.current) return;
    const dx = e.touches[0].clientX - touchStartX.current;
    const dy = e.touches[0].clientY - touchStartY.current;
    // 세로 이동이 더 크면 잠금
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 6) {
      swipeLocked.current = true;
      setSlideX(0);
      return;
    }
    if (Math.abs(dx) < 4) return; // 미세 떨림 무시
    if (touchStartEdge.current) return; // 엣지 스와이프는 드로어 전용
    const cur = NAV_ORDER.indexOf(view);
    // 경계 저항감
    const bounded = (cur === 0 && dx > 0) || (cur === NAV_ORDER.length - 1 && dx < 0)
      ? dx * 0.12
      : dx;
    setSlideX(bounded);
  };
  const handleTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    const dy = e.changedTouches[0].clientY - touchStartY.current;
    // 엣지 드로어
    if (touchStartEdge.current && dx > 40 && !drawerOpen) {
      setDrawerOpen(true); setSlideX(0); touchStartX.current = null; return;
    }
    if (drawerOpen && dx < -40) {
      setDrawerOpen(false); setSlideX(0); touchStartX.current = null; return;
    }
    if (swipeLocked.current || Math.abs(dy) > Math.abs(dx)) {
      setSlideX(0); touchStartX.current = null; return;
    }
    const cur = NAV_ORDER.indexOf(view);
    const W = window.innerWidth;
    setIsSliding(true);
    // 임계값: 화면의 8% 또는 절대 30px 이상이면 전환
    const threshold = Math.min(W * 0.08, 30);
    if (dx < -threshold && cur < NAV_ORDER.length - 1) {
      setSlideX(-W);
      setTimeout(() => { changeView(NAV_ORDER[cur+1]); setSearch(""); setSlideX(0); setIsSliding(false); }, 180);
    } else if (dx > threshold && cur > 0) {
      setSlideX(W);
      setTimeout(() => { changeView(NAV_ORDER[cur-1]); setSearch(""); setSlideX(0); setIsSliding(false); }, 180);
    } else {
      setSlideX(0);
      setTimeout(() => setIsSliding(false), 180);
    }
    touchStartX.current = null;
  };

  return (
    <React.Fragment>
      <style>{`
        ::selection{background:#DBEAFE;color:#1D4ED8}
        ::-webkit-scrollbar{width:5px;height:4px}
        ::-webkit-scrollbar-thumb{background:#E0E0E0;border-radius:4px}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}

                            {t.desc&&<div style={{fontSize:12,color:"#9B9A97",marginTop:2,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{t.desc}</div>}
                            <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
                              {cat&&<Tag label={cat.name} color={cat.color} />}
                              <span style={{fontSize:10,color:stale?"#EB5757":"#B4B4B0"}}>{fmtDate(t.createdAt)}</span>
                              {t.dueDate&&<span style={{fontSize:10,color:!t.done&&daysAgo(t.dueDate)>0?"#EB5757":"#9B9A97"}}>마감 {fmtDate(t.dueDate)}</span>}
                              {stale&&<span style={{fontSize:9,fontWeight:700,color:"#EB5757"}}>미확인 {daysAgo(t.lastChecked||t.createdAt)}일</span>}

                          </div>
                          <div style={{display:"flex",gap:2,flexShrink:0}}>

                            <Mini onClick={()=>openModal("task",t)}>✎</Mini>
                            <Mini onClick={()=>delTask(t.id)}>✕</Mini>
                          </div>
                        </div>

                    })

                  <button onClick={()=>openModal("task")} style={{...linkBtn,padding:"10px 4px",fontSize:12.5,color:"#B4B4B0"}}>+ 새 할 일</button>
                </div>

                {/* 구분선 (PC 전용) */}
                <div className="desk task-divider" style={{width:1,background:"#EFEFEF",margin:"0 4px",flexShrink:0}} />

                {/* ── 회사 컬럼 ── */}
                <div className={taskGroup==="work"?"task-col-show":"task-col-hide"} style={{minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,paddingBottom:8,borderBottom:"2px solid #2F80ED20"}}>
                    <span style={{fontSize:14,fontWeight:700,color:"#2F80ED"}}>🏢 회사</span>
                    <div style={{display:"flex",gap:10}}>
                      {["active","done"].map(t=>(
                        <button key={t} onClick={()=>setTaskTabWork(t)}
                          style={{...tabBtn,fontSize:12,color:taskTabWork===t?"#37352F":"#B4B4B0",fontWeight:taskTabWork===t?600:400,borderBottom:taskTabWork===t?"2px solid #2F80ED":"2px solid transparent",paddingBottom:3}}>
                          {t==="active"?"진행 중":"완료"}
                        </button>
                      ))}
                    </div>
                  </div>
                  {filteredWork.length===0
                    ?<Empty icon="💼" msg={taskTabWork==="active"?"회사 할 일을 추가해보세요":"완료된 항목 없음"} />
                    :filteredWork.map((t,i)=>{
                      const cat=data.taskCats.find(c=>c.id===t.category);
                      const stale=!t.done&&daysAgo(t.lastChecked||t.createdAt)>=STALE;
                      return(
                        <div key={t.id} className="row-h" style={{padding:"10px 4px",borderBottom:"1px solid #F7F6F3",display:"flex",alignItems:"flex-start",gap:10,background:stale?"#FFFBFA":"transparent",borderLeft:stale?"3px solid #2F80ED":"3px solid transparent",paddingLeft:stale?10:4,animation:`fadeUp 0.25s ease ${i*0.02}s both`}}>
                          <button onClick={()=>updTask(t.id,{done:!t.done,lastChecked:Date.now()})} style={{width:18,height:18,borderRadius:3,flexShrink:0,marginTop:1,border:`1.5px solid ${t.done?(cat?.color||"#2F80ED"):"#D3D1CB"}`,background:t.done?(cat?.color||"#2F80ED"):"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{t.done&&<span style={{color:"#fff",fontSize:10,fontWeight:800}}>✓</span>}</button>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13.5,fontWeight:500,color:t.done?"#B4B4B0":"#37352F",textDecoration:t.done?"line-through":"none"}}>{t.title}</div>
                            {t.desc&&<div style={{fontSize:12,color:"#9B9A97",marginTop:2,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{t.desc}</div>}
                            <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
                              {cat&&<Tag label={cat.name} color={cat.color} />}
                              <span style={{fontSize:10,color:stale?"#EB5757":"#B4B4B0"}}>{fmtDate(t.createdAt)}</span>
                              {t.dueDate&&<span style={{fontSize:10,color:!t.done&&daysAgo(t.dueDate)>0?"#EB5757":"#9B9A97"}}>마감 {fmtDate(t.dueDate)}</span>}
                              {stale&&<span style={{fontSize:9,fontWeight:700,color:"#EB5757"}}>미확인 {daysAgo(t.lastChecked||t.createdAt)}일</span>}
                            </div>
                          </div>
                          <div style={{display:"flex",gap:2,flexShrink:0}}>
                            {stale&&<Mini onClick={()=>updTask(t.id,{lastChecked:Date.now()})} c="#27AE60">✓</Mini>}
                            <Mini onClick={()=>openModal("task",t)}>✎</Mini>
                            <Mini onClick={()=>delTask(t.id)}>✕</Mini>
                          </div>
                        </div>
                      );
                    })
                  }
                  <button onClick={()=>openModal("task")} style={{...linkBtn,padding:"10px 4px",fontSize:12.5,color:"#B4B4B0"}}>+ 새 할 일</button>
                </div>

              </div>
            </section>)}

            {/* NEWS */}
            {view==="news"&&(<section style={{animation:"fadeUp 0.3s"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div><h1 style={{fontSize:22,fontWeight:700}}>News Hub</h1><p style={{fontSize:12,color:"#9B9A97",marginTop:1}}>{filteredNews.length}개{newsFilterLabel?` · ${newsFilterLabel}`:""}</p></div>
                <button onClick={()=>openModal("news")} style={primaryBtn}>+ 추가</button>
              </div>
              {filteredNews.length===0?<Empty icon="📰" msg="뉴스를 추가해보세요" />:(
                <React.Fragment>
                  {/* ── PINNED 구역 ── */}
                  {filteredNews.some(n=>n.pinned)&&(
                    <div style={{marginBottom:20}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#F59E0B",letterSpacing:0.3}}>📌 PINNED</span>
                        <div style={{flex:1,height:1,background:"#FDE68A"}} />
                      </div>
                      <div className="ngrid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
                        {filteredNews.filter(n=>n.pinned).map((n,i)=>{const stale=!n.read&&daysAgo(n.lastChecked||n.createdAt)>=STALE;return(
                          <div key={n.id} className="card-pinned" style={{border:`2px solid #FCD34D`,borderRadius:8,overflow:"hidden",opacity:n.read?0.65:1,animation:`fadeUp 0.3s ease ${i*0.03}s both`,position:"relative"}}>
                            <div style={{position:"absolute",top:6,left:6,zIndex:2,background:"#F59E0B",borderRadius:4,padding:"1px 5px",display:"flex",alignItems:"center",gap:3}}>
                              <span style={{fontSize:9,color:"#fff",fontWeight:700}}>📌 PIN</span>
                            </div>
                            <ThumbMedia thumb={n.thumbnail} url={n.url} source={n.source||detectSource(n.url)} />
                            <div style={{padding:"12px 14px"}}>
                              <div style={{display:"flex",alignItems:"start",gap:6}}>
                                <h3 style={{flex:1,fontSize:13.5,fontWeight:600,lineHeight:1.4}}>{n.title}</h3>
                                {stale&&<span style={{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,background:"#FEE2E2",color:"#EB5757",flexShrink:0}}>{daysAgo(n.lastChecked||n.createdAt)}일</span>}
                              </div>
                              {n.description&&<p style={{fontSize:12,color:"#9B9A97",lineHeight:1.45,marginTop:4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{n.description}</p>}
                              <div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:8}}>
                                {(n.categories||[]).map((cid)=>{const mc=data.newsCats.find((c)=>c.id===cid);return mc?<Tag key={cid} label={mc.name} color={mc.color} />:null;})}
                                {(n.subCategories||[]).map((sid)=>{const p=data.newsCats.find((c)=>c.subs.some((s)=>s.id===sid));const sub=p?.subs.find((s)=>s.id===sid);return sub?<span key={sid} style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"#F7F6F3",color:"#9B9A97"}}>{sub.name}</span>:null;})}
                              </div>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10,paddingTop:8,borderTop:"1px solid #F7F6F3"}}>
                                <span style={{fontSize:10,color:"#B4B4B0"}}>{n.source||detectSource(n.url)} · {fmtDate(n.createdAt)}</span>
                                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                                  {n.url&&<a href={n.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#2F80ED",textDecoration:"none",fontWeight:500}}>열기↗</a>}
                                  <button onClick={()=>updNews(n.id,{read:!n.read,lastChecked:Date.now()})} style={tinyBtn}>{n.read?"✓읽음":"읽기"}</button>
                                  <button title="핀 해제" onClick={()=>updNews(n.id,{pinned:false})} style={{...tinyBtn,color:"#F59E0B",fontWeight:700}}>📌</button>
                                  <button onClick={()=>openModal("news-edit",n)} style={tinyBtn}>✎</button>
                                  <button onClick={()=>delNews(n.id)} style={tinyBtn}>✕</button>
                                </div>
                              </div>
                            </div>
                          </div>
                        );})}
                      </div>
                    </div>
                  )}
                  {/* ── 일반 구역 ── */}
                  {filteredNews.some(n=>!n.pinned)&&(
                    <React.Fragment>
                      {filteredNews.some(n=>n.pinned)&&(
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                          <span style={{fontSize:12,fontWeight:700,color:"#9B9A97",letterSpacing:0.3}}>전체</span>
                          <div style={{flex:1,height:1,background:"#EFEFEF"}} />
                        </div>
                      )}
                      <div className="ngrid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>
                        {filteredNews.filter(n=>!n.pinned).map((n,i)=>{const stale=!n.read&&daysAgo(n.lastChecked||n.createdAt)>=STALE;return(
                          <div key={n.id} className="card-h" style={{border:`1.5px solid ${stale?"#FECACA":"#D5D3CE"}`,borderRadius:8,overflow:"hidden",opacity:n.read?0.55:1,animation:`fadeUp 0.3s ease ${i*0.03}s both`}}>
                            <ThumbMedia thumb={n.thumbnail} url={n.url} source={n.source||detectSource(n.url)} />
                            <div style={{padding:"12px 14px"}}>
                              <div style={{display:"flex",alignItems:"start",gap:6}}>
                                <h3 style={{flex:1,fontSize:13.5,fontWeight:600,lineHeight:1.4}}>{n.title}</h3>
                                {stale&&<span style={{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,background:"#FEE2E2",color:"#EB5757",flexShrink:0}}>{daysAgo(n.lastChecked||n.createdAt)}일</span>}
                              </div>
                              {n.description&&<p style={{fontSize:12,color:"#9B9A97",lineHeight:1.45,marginTop:4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{n.description}</p>}
                              <div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:8}}>
                                {(n.categories||[]).map((cid)=>{const mc=data.newsCats.find((c)=>c.id===cid);return mc?<Tag key={cid} label={mc.name} color={mc.color} />:null;})}
                                {(n.subCategories||[]).map((sid)=>{const p=data.newsCats.find((c)=>c.subs.some((s)=>s.id===sid));const sub=p?.subs.find((s)=>s.id===sid);return sub?<span key={sid} style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:"#F7F6F3",color:"#9B9A97"}}>{sub.name}</span>:null;})}
                              </div>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:10,paddingTop:8,borderTop:"1px solid #F7F6F3"}}>
                                <span style={{fontSize:10,color:"#B4B4B0"}}>{n.source||detectSource(n.url)} · {fmtDate(n.createdAt)}</span>
                                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                                  {n.url&&<a href={n.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#2F80ED",textDecoration:"none",fontWeight:500}}>열기↗</a>}
                                  <button onClick={()=>updNews(n.id,{read:!n.read,lastChecked:Date.now()})} style={tinyBtn}>{n.read?"✓읽음":"읽기"}</button>
                                  <button title="상단 고정" onClick={()=>updNews(n.id,{pinned:true})} style={{...tinyBtn,color:"#D1D5DB",fontSize:13}} onMouseEnter={e=>e.target.style.color="#F59E0B"} onMouseLeave={e=>e.target.style.color="#D1D5DB"}>📌</button>
                                  <button onClick={()=>openModal("news-edit",n)} style={tinyBtn}>✎</button>
                                  <button onClick={()=>delNews(n.id)} style={tinyBtn}>✕</button>
                                </div>
                              </div>
                            </div>
                          </div>
                        );})}
                      </div>
                    </React.Fragment>
                  )}
                </React.Fragment>
              )}
            </section>)}

            {/* REMINDERS */}
            {view==="reminders"&&(<section style={{animation:"fadeUp 0.3s"}}>
              <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>리마인더</h1>
              <p style={{fontSize:13,color:"#9B9A97",marginBottom:24}}>{STALE}일 이상 미확인 항목</p>
              {reminders===0?<Empty icon="🎉" msg="모두 확인 완료!" />:(
                <React.Fragment>
                  {staleT.length>0&&(<div style={{marginBottom:24}}><h3 style={{fontSize:14,fontWeight:700,color:"#EB5757",marginBottom:8}}>할 일 — {staleT.length}개</h3>{staleT.map((t)=>{const cat=data.taskCats.find((c)=>c.id===t.category);return(<div key={t.id} style={{padding:"10px 12px",borderBottom:"1px solid #F7F6F3",display:"flex",alignItems:"center",gap:10,borderLeft:`3px solid ${cat?.color||"#EB5757"}`}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{t.title}</div><div style={{fontSize:11,color:"#EB5757",marginTop:1}}>{daysAgo(t.lastChecked||t.createdAt)}일 미확인</div></div><Rbtn c="#27AE60" onClick={()=>updTask(t.id,{lastChecked:Date.now()})}>확인</Rbtn><Rbtn c="#2F80ED" onClick={()=>updTask(t.id,{done:true,lastChecked:Date.now()})}>완료</Rbtn></div>);})}</div>)}
                  {staleN.length>0&&(<div><h3 style={{fontSize:14,fontWeight:700,color:"#F2994A",marginBottom:8}}>뉴스 — {staleN.length}개</h3>{staleN.map((n)=>(<div key={n.id} style={{padding:"10px 12px",borderBottom:"1px solid #F7F6F3",display:"flex",alignItems:"center",gap:10,borderLeft:"3px solid #F2994A"}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{n.title}</div><div style={{fontSize:11,color:"#F2994A",marginTop:1}}>{daysAgo(n.lastChecked||n.createdAt)}일 미확인</div></div>{n.url&&<a href={n.url} target="_blank" rel="noopener noreferrer" style={{...rbtnSt("#2F80ED"),textDecoration:"none"}}>열기</a>}<Rbtn c="#27AE60" onClick={()=>updNews(n.id,{lastChecked:Date.now()})}>확인</Rbtn><Rbtn c="#9B9A97" onClick={()=>updNews(n.id,{read:true,lastChecked:Date.now()})}>읽음</Rbtn></div>))}</div>)}
                </React.Fragment>
              )}
            </section>)}
          </div>{/* slide-inner */}
          </div>{/* slide-wrap */}
        </main>

        {/* MOBILE BOTTOM TAB */}
        <nav className="mob" style={{position:"fixed",bottom:0,left:0,right:0,zIndex:40,background:"#fff",borderTop:"1px solid #EFEFEF",display:"flex",padding:"8px 0 10px",paddingBottom:"max(10px, env(safe-area-inset-bottom))"}}>
          {navItems.map((n)=>(<button key={n.id} onClick={()=>{changeView(n.id);setSearch("");setFilterOpen(false);}} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative",fontFamily:"inherit"}}><span style={{fontSize:13,fontWeight:view===n.id?700:500,color:view===n.id?"#37352F":"#B4B4B0"}}>{n.label}</span>{n.hot&&n.count>0&&<span style={{position:"absolute",top:-4,right:"20%",minWidth:16,height:16,borderRadius:8,background:"#DC2626",color:"#fff",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{n.count}</span>}</button>))}
        </nav>

        {/* MODALS */}
        {modal&&(<div onMouseDown={(e)=>{if(e.target===e.currentTarget)closeModal();}} style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,0.25)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}><div onMouseDown={(e)=>e.stopPropagation()} style={{background:"#fff",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:520,maxHeight:"88vh",overflow:"auto",animation:"slideUp 0.25s",boxShadow:"0 -8px 32px rgba(0,0,0,0.1)"}}>
          {modal==="task"&&<TaskForm initial={editItem} cats={data.taskCats} defaultGroup={taskGroup} onSubmit={(t)=>{editItem?updTask(editItem.id,t):addTask(t);closeModal();}} onClose={closeModal} />}
          {modal==="news"&&<NewsForm cats={data.newsCats} onSubmit={(n)=>{addNews(n);closeModal();}} onClose={closeModal} />}
          {modal==="news-edit"&&editItem&&<NewsEditForm initial={editItem} cats={data.newsCats} onSubmit={(u)=>{updNews(editItem.id,u);closeModal();}} onClose={closeModal} />}
        </div></div>)}
      </div>
    </React.Fragment>
  );
}

/* ═══ COMPONENTS ═══ */
const Loader=()=>(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><div style={{width:24,height:24,border:"2.5px solid #EFEFEF",borderTopColor:"#37352F",borderRadius:"50%",animation:"spin 0.7s linear infinite"}} /></div>);
const Empty=({icon,msg})=>(<div style={{textAlign:"center",padding:"50px 20px",color:"#B4B4B0"}}><div style={{fontSize:32,marginBottom:8}}>{icon}</div><div style={{fontSize:13}}>{msg}</div></div>);
const Tag=({label,color})=>(<span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:`${color}15`,color,fontWeight:600}}>{label}</span>);
const Mini=({onClick,children,c})=>(<button onClick={onClick} style={{width:24,height:24,borderRadius:4,border:"none",background:c?`${c}15`:"#F7F6F3",color:c||"#9B9A97",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{children}</button>);
const rbtnSt=(c)=>({padding:"4px 10px",borderRadius:5,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:`${c}15`,color:c,fontFamily:"inherit",whiteSpace:"nowrap"});
const Rbtn=({c,onClick,children})=>(<button onClick={onClick} style={rbtnSt(c)}>{children}</button>);
const Chip=({label,color,active,onClick,hasSubs,expanded})=>(<button onClick={onClick} style={{padding:"5px 12px",borderRadius:5,fontSize:12,fontWeight:500,border:"none",cursor:"pointer",background:active?(color||"#37352F"):"#F0F0EE",color:active?"#fff":"#6B6B6B",whiteSpace:"nowrap",flexShrink:0,fontFamily:"inherit",display:"flex",alignItems:"center",gap:3}}>{label}{hasSubs&&<span style={{fontSize:8,display:"inline-block",transform:expanded?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>}</button>);
const SubChip=({label,count,active,color,onClick})=>(<button onClick={onClick} style={{padding:"3px 10px",borderRadius:4,fontSize:11,fontWeight:500,border:active?`1px solid ${color}33`:"1px solid transparent",background:active?`${color}18`:"#F7F6F3",color:active?color:"#9B9A97",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontFamily:"inherit"}}>{label}{count!==undefined?` ${count}`:""}</button>);
const SidebarCatRow=({label,active,onClick,dotColor,count})=>(<button onClick={onClick} style={{...catBtn,padding:"4px 2px",marginBottom:2}}><span style={{width:14,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{width:active?8:6,height:active?8:6,borderRadius:2,background:dotColor}} /></span><span style={{fontSize:12,fontWeight:active?600:400,color:"#37352F"}}>{label}</span><span style={{fontSize:10,color:"#B4B4B0",marginLeft:"auto"}}>{count}</span></button>);

const navBtn={width:"100%",textAlign:"left",padding:"6px 10px",borderRadius:5,marginBottom:1,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:7,fontSize:12.5,fontFamily:"inherit"};
const catBtn={flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:5,padding:"0 4px",fontFamily:"inherit",width:"100%",textAlign:"left"};
const arrowBtn={background:"none",border:"none",cursor:"pointer",width:14,height:14,padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,transition:"transform 0.2s"};
const linkBtn={background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"};
const editInput={flex:1,border:"none",borderBottom:"1px solid #EFEFEF",background:"transparent",fontSize:12,color:"#37352F",outline:"none",padding:"1px 2px",fontFamily:"inherit"};
const primaryBtn={padding:"5px 12px",borderRadius:6,border:"none",cursor:"pointer",background:"#56B4E8",color:"#fff",fontSize:11.5,fontWeight:600,fontFamily:"inherit"};
const inputSt={padding:"8px 12px",borderRadius:6,border:"1px solid #EFEFEF",background:"#F7F6F3",fontSize:13,color:"#37352F",outline:"none",fontFamily:"inherit"};
const tinyBtn={background:"none",border:"none",fontSize:11,color:"#9B9A97",cursor:"pointer",fontFamily:"inherit"};
const tabBtn={background:"none",border:"none",cursor:"pointer",fontSize:12.5,paddingBottom:4,fontFamily:"inherit"};

const FField=({label,children})=>(<div style={{marginBottom:12}}><label style={{display:"block",fontSize:11,fontWeight:600,color:"#9B9A97",marginBottom:4}}>{label}</label>{children}</div>);
const fInput={...inputSt,width:"100%"};

function TaskForm({initial,cats,defaultGroup,onSubmit,onClose}){
  // 신규 추가 시: 현재 탭(개인/회사)에 맞는 카테고리 기본 선택
  const defaultCat = initial?.category || (
    defaultGroup==="personal"
      ? (cats.find(c=>c.id==="personal")?.id || cats[0]?.id)
      : (cats.find(c=>c.id==="work")?.id || cats[0]?.id)
  );
  const[title,setTitle]=useState(initial?.title||"");
  const[desc,setDesc]=useState(initial?.desc||"");
  const[cat,setCat]=useState(defaultCat||"");
  const[pri,setPri]=useState(initial?.priority||"medium");
  const[due,setDue]=useState(initial?.dueDate?new Date(initial.dueDate).toISOString().split("T")[0]:"");

}

/* ═══ OG SCRAPER ═══ */
// OG 메타 파싱 헬퍼
function parseOgFromHtml(html, url) {
  const getOg = (prop) => {
    const patterns = [
      new RegExp(`<meta[^>]+property=["']og:${prop}["'][^>]+content=["']([^"']{1,500})["']`,"i"),
      new RegExp(`<meta[^>]+content=["']([^"']{1,500})["'][^>]+property=["']og:${prop}["']`,"i"),
      new RegExp(`<meta[^>]+name=["']${prop}["'][^>]+content=["']([^"']{1,500})["']`,"i"),
      new RegExp(`<meta[^>]+content=["']([^"']{1,500})["'][^>]+name=["']${prop}["']`,"i"),
    ];
    for (const re of patterns) {
      const m = html.match(re);
      if (m) return m[1].replace(/&amp;/g,"&").replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&#x27;/g,"'").trim();
    }
    return "";
  };
  const titleTag = html.match(/<title[^>]*>([^<]{1,300})<\/title>/i);
  const ytId = getYtId(url);
  return {
    title: getOg("title") || (titleTag ? titleTag[1].trim() : ""),
    description: getOg("description"),
    thumbnail: ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : getOg("image"),
    source: getOg("site_name") || detectSource(url),
  };
}

async function fetchOgMeta(rawUrl) {
  const url = rawUrl.trim();

  // ── YouTube: API 없이 바로 처리 ──
  const ytId = getYtId(url);
  if (ytId) {
    // noembed는 CORS 허용, YouTube 제목 무료 제공
    try {
      const res = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`,
        { signal: AbortSignal.timeout(5000) });
      if (res.ok) {
        const j = await res.json();
        return {
          title: j.title || "",
          description: "",
          thumbnail: `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`,
          source: "YouTube",
        };
      }
    } catch(e) {}
    // noembed 실패해도 썸네일은 보장
    return { title:"", description:"", thumbnail:`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`, source:"YouTube" };
  }

  // ── 일반 URL: 프록시 병렬 경쟁 ──
  // 각 프록시에서 html 문자열을 반환하는 함수
  const tryProxy = async (proxyUrl, isJson) => {
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error("not ok");
    if (isJson) {
      const j = await res.json();
      const html = j.contents || j.body || "";
      if (html.length < 50) throw new Error("empty");
      return html;
    }
    const text = await res.text();
    if (text.length < 50) throw new Error("empty");
    return text;
  };

  const enc = encodeURIComponent(url);
  const proxyCalls = [
    tryProxy(`https://api.allorigins.win/get?url=${enc}`, true),
    tryProxy(`https://api.codetabs.com/v1/proxy?quest=${enc}`, false),
    tryProxy(`https://thingproxy.freeboard.io/fetch/${enc}`, false),
    tryProxy(`https://corsproxy.io/?${enc}`, false),
  ];

  // 가장 먼저 성공한 프록시 결과 사용
  let html = "";
  try {
    html = await Promise.any(proxyCalls);
  } catch(e) {
    return null; // 모두 실패
  }

  const meta = parseOgFromHtml(html, url);
  if (!meta.title && !meta.thumbnail) return null;
  return meta;
}

function NewsForm({cats,onSubmit,onClose}){
  const [url,setUrl]=useState("");
  const [title,setTitle]=useState("");
  const [desc,setDesc]=useState("");
  const [thumb,setThumb]=useState("");
  const [selCats,setSelCats]=useState([]);
  const [selSubs,setSelSubs]=useState([]);
  const [source,setSource]=useState("");
  const [fetching,setFetching]=useState(false);
  const [fetchStatus,setFetchStatus]=useState(null); // "ok"|"fail"|null
  const toggleCat=(id)=>setSelCats((p)=>p.includes(id)?p.filter((x)=>x!==id):[...p,id]);
  const toggleSub=(id)=>setSelSubs((p)=>p.includes(id)?p.filter((x)=>x!==id):[...p,id]);

  const handleUrlChange = (e) => {
    setUrl(e.target.value);
    setSource(detectSource(e.target.value));
    setFetchStatus(null);
  };

  const handleFetch = async () => {
    if (!url.trim()) return;
    setFetching(true);
    setFetchStatus(null);
    try {
      const meta = await fetchOgMeta(url.trim());
      if (meta && (meta.title || meta.thumbnail)) {
        if (meta.title && !title) setTitle(meta.title);
        if (meta.description && !desc) setDesc(meta.description);
        if (meta.thumbnail && !thumb) setThumb(meta.thumbnail);
        if (meta.source) setSource(meta.source);
        setFetchStatus("ok");
      } else {
        setFetchStatus("fail");
      }
    } catch(e) {
      setFetchStatus("fail");
    }
    setFetching(false);
  };

  // URL 붙여넣기시 자동 스크래핑
  const handlePaste = (e) => {
    const pasted = e.clipboardData.getData("text").trim();
    if (pasted.startsWith("http")) {
      setTimeout(() => {
        setUrl(pasted);
        setSource(detectSource(pasted));
        setFetchStatus(null);
        // 약간의 딜레이 후 자동 fetch
        setTimeout(async () => {
          setFetching(true);
          try {
            const meta = await fetchOgMeta(pasted);
            if (meta && (meta.title || meta.thumbnail)) {
              if (meta.title) setTitle(meta.title);
              if (meta.description) setDesc(meta.description);
              if (meta.thumbnail) setThumb(meta.thumbnail);
              if (meta.source) setSource(meta.source);
              setFetchStatus("ok");
            } else { setFetchStatus("fail"); }
          } catch(e) { setFetchStatus("fail"); }
          setFetching(false);
        }, 100);
      }, 0);
    }
  };

  return (
    <div>
      <div style={{padding:"16px 20px",borderBottom:"1px solid #F0F0EE"}}>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <h2 style={{fontSize:16,fontWeight:700}}>뉴스 추가</h2>
          <button onClick={onClose} style={{...linkBtn,fontSize:18,color:"#9B9A97"}}>✕</button>
        </div>
      </div>
      <div style={{padding:"16px 20px"}}>

        {/* URL + 자동 가져오기 */}
        <FField label="URL">
          <div style={{display:"flex",gap:6}}>
            <input
              value={url}
              onChange={handleUrlChange}
              onPaste={handlePaste}
              placeholder="https://... (붙여넣기하면 자동 완성)"
              style={{...fInput,flex:1}}
              autoFocus
            />
            <button
              onClick={handleFetch}
              disabled={!url.trim()||fetching}
              style={{...primaryBtn,padding:"8px 12px",flexShrink:0,opacity:url.trim()&&!fetching?1:0.4,minWidth:60}}
            >
              {fetching ? "..." : "가져오기"}
            </button>
          </div>
          {/* 상태 메시지 */}
          {fetchStatus==="ok"&&<div style={{fontSize:11,color:"#27AE60",marginTop:4}}>✓ 제목·설명·썸네일 자동 완성됐습니다</div>}
          {fetchStatus==="fail"&&<div style={{fontSize:11,color:"#F2994A",marginTop:4}}>⚠ 자동 가져오기 실패 — 해당 사이트가 외부 접근을 차단했습니다. 제목/썸네일을 직접 입력해 주세요.</div>}
          {fetching&&<div style={{fontSize:11,color:"#9B9A97",marginTop:4}}>⏳ 여러 경로로 동시 시도 중...</div>}
        </FField>

        {/* 썸네일 미리보기 */}
        {thumb&&(
          <div style={{marginBottom:12,borderRadius:6,overflow:"hidden",maxHeight:140,background:"#F7F6F3",position:"relative"}}>
            <img src={thumb} alt="" style={{width:"100%",objectFit:"cover",maxHeight:140,display:"block"}}
              onError={(e)=>{e.target.parentElement.style.display="none"}} />
            <button onClick={()=>setThumb("")} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.5)",border:"none",borderRadius:4,color:"#fff",fontSize:11,padding:"2px 6px",cursor:"pointer"}}>✕</button>
          </div>
        )}

        <FField label="제목">
          <input value={title} onChange={(e)=>setTitle(e.target.value)} placeholder="기사 제목" style={fInput} />
        </FField>
        <FField label="설명">
          <textarea value={desc} onChange={(e)=>setDesc(e.target.value)} placeholder="간단 메모" rows={2} style={{...fInput,resize:"vertical"}} />
        </FField>
        <FField label="썸네일 URL">
          <input value={thumb} onChange={(e)=>setThumb(e.target.value)} placeholder="이미지 URL (선택)" style={fInput} />
        </FField>
        <FField label="카테고리">
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {cats.map((c)=>(<div key={c.id}>
              <button onClick={()=>toggleCat(c.id)} style={{padding:"4px 10px",borderRadius:4,fontSize:12,cursor:"pointer",background:selCats.includes(c.id)?c.color:"#F7F6F3",color:selCats.includes(c.id)?"#fff":"#6B6B6B",border:"none",fontFamily:"inherit",fontWeight:500}}>{c.name}</button>
              {selCats.includes(c.id)&&c.subs.length>0&&(
                <div style={{display:"flex",gap:4,marginTop:4,paddingLeft:8,flexWrap:"wrap"}}>
                  {c.subs.map((s)=>(<button key={s.id} onClick={()=>toggleSub(s.id)} style={{padding:"2px 8px",borderRadius:3,fontSize:11,cursor:"pointer",background:selSubs.includes(s.id)?`${c.color}20`:"#F7F6F3",color:selSubs.includes(s.id)?c.color:"#9B9A97",border:selSubs.includes(s.id)?`1px solid ${c.color}44`:"1px solid transparent",fontFamily:"inherit"}}>{s.name}</button>))}
                </div>
              )}
            </div>))}
          </div>
        </FField>
        <FField label="출처">
          <input value={source} onChange={(e)=>setSource(e.target.value)} placeholder="자동 감지" style={fInput} />
        </FField>
        <button
          onClick={()=>title.trim()&&onSubmit({title:title.trim(),url,description:desc,thumbnail:thumb,categories:selCats,subCategories:selSubs,source:source||detectSource(url)})}
          style={{...primaryBtn,width:"100%",padding:10,marginTop:4,opacity:title.trim()?1:0.4}}
        >추가</button>
      </div>
    </div>
  );
}

1px solid ${c.color}44`:"1px solid transparent",fontFamily:"inherit"}}>{s.name}</button>))}</div>)}</div>))}</div></FField><FField label="출처"><input value={source} onChange={(e)=>setSource(e.target.value)} style={fInput} /></FField><button onClick={()=>title.trim()&&onSubmit({title:title.trim(),description:desc,thumbnail:thumb,categories:selCats,subCategories:selSubs,source})} style={{...primaryBtn,width:"100%",padding:10,marginTop:4}}>수정</button></div></div>);}
